<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Taschenrechner Kostüm · Live Display</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

:root {
  --bg: #080c08;
  --panel: #111811;
  --display-bg: #061006;
  --green: #39ff5a;
  --green-mid: #22cc3a;
  --green-dim: #0d4a18;
  --green-glow: rgba(57,255,90,0.25);
  --amber: #ffb830;
  --blue-op: #4fc3f7;
  --red-fn: #ff6b6b;
  --btn: #141a14;
  --btn-border: #1e2a1e;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: var(--green);
  font-family: 'Share Tech Mono', monospace;
  min-height: 100vh;
  overflow: hidden;
}

/* ─── SCREENS ─── */
.screen { 
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 20px;
  transition: opacity 0.3s;
}
.screen.hidden { opacity: 0; pointer-events: none; }

/* ─── SETUP ─── */
#setup { gap: 16px; }

.logo {
  font-family: 'Orbitron', monospace;
  font-size: 11px;
  letter-spacing: 6px;
  color: var(--green-dim);
  text-transform: uppercase;
  margin-bottom: 8px;
}

.big-card {
  background: var(--panel);
  border: 1px solid var(--btn-border);
  border-radius: 12px;
  padding: 22px 20px;
  width: 100%;
  max-width: 340px;
}

.card-label {
  font-size: 9px;
  letter-spacing: 4px;
  color: var(--green-dim);
  text-transform: uppercase;
  margin-bottom: 14px;
}

.pill-btn {
  width: 100%;
  background: var(--green-dim);
  border: 1px solid var(--green-mid);
  color: var(--green);
  font-family: 'Orbitron', monospace;
  font-size: 12px;
  letter-spacing: 3px;
  padding: 16px;
  border-radius: 8px;
  cursor: pointer;
  text-shadow: 0 0 8px var(--green-glow);
  transition: all 0.15s;
  margin-bottom: 8px;
}
.pill-btn:active { opacity: 0.6; transform: scale(0.97); }

.room-input {
  width: 100%;
  background: var(--btn);
  border: 1px solid var(--btn-border);
  color: var(--green);
  font-family: 'Orbitron', monospace;
  font-size: 20px;
  padding: 14px;
  border-radius: 8px;
  text-align: center;
  letter-spacing: 5px;
  outline: none;
  margin-bottom: 10px;
}
.room-input::placeholder { color: var(--green-dim); letter-spacing: 3px; font-size: 14px; }
.room-input:focus { border-color: var(--green-dim); }

.divider {
  text-align: center;
  font-size: 9px;
  letter-spacing: 4px;
  color: var(--green-dim);
  margin: 12px 0;
}

#setup-error {
  font-size: 10px;
  color: var(--red-fn);
  letter-spacing: 2px;
  text-align: center;
  min-height: 16px;
}

/* ─── CONTROLLER ─── */
#ctrl {
  justify-content: flex-start;
  padding: 10px 12px 8px;
  gap: 0;
  overflow-y: auto;
  max-width: 420px;
  margin: 0 auto;
  width: 100%;
}

.ctrl-topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  padding: 0 0 8px 0;
  font-size: 9px;
  letter-spacing: 3px;
  color: var(--green-dim);
}

.status-dot { 
  width: 6px; height: 6px; 
  border-radius: 50%; 
  background: var(--green-dim);
  display: inline-block;
  margin-right: 5px;
  transition: background 0.3s;
}
.status-dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); }

.share-pill {
  background: none;
  border: 1px solid var(--green-dim);
  color: var(--green-dim);
  font-family: 'Orbitron', monospace;
  font-size: 8px;
  letter-spacing: 2px;
  padding: 4px 10px;
  border-radius: 20px;
  cursor: pointer;
}

.ctrl-display {
  width: 100%;
  background: var(--display-bg);
  border: 2px solid var(--green-dim);
  border-radius: 8px;
  padding: 10px 16px;
  font-family: 'Orbitron', monospace;
  font-size: clamp(22px, 7vw, 36px);
  text-align: right;
  min-height: 56px;
  max-height: 80px;
  overflow: hidden;
  color: var(--green);
  text-shadow: 0 0 12px var(--green-glow);
  margin-bottom: 8px;
  word-break: break-all;
  line-height: 1.1;
}

.calc-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  width: 100%;
  margin-bottom: 8px;
}

.c-btn {
  background: var(--btn);
  border: 1px solid var(--btn-border);
  color: var(--green);
  font-family: 'Orbitron', monospace;
  font-size: clamp(14px, 4.5vw, 22px);
  padding: 16px 0;
  border-radius: 7px;
  cursor: pointer;
  transition: all 0.08s;
  text-shadow: 0 0 6px var(--green-glow);
  user-select: none;
}
.c-btn:active { background: var(--green-dim); box-shadow: 0 0 12px var(--green-glow); transform: scale(0.93); }
.c-btn.op  { color: var(--blue-op); text-shadow: 0 0 6px rgba(79,195,247,0.3); }
.c-btn.fn  { color: var(--red-fn); text-shadow: 0 0 6px rgba(255,107,107,0.3); }
.c-btn.eq  { background: var(--green-dim); color: var(--green); box-shadow: 0 0 12px var(--green-glow); }
.c-btn.wide { grid-column: span 2; }

.custom-row {
  display: flex;
  gap: 6px;
  width: 100%;
}

.custom-in {
  flex: 1;
  background: var(--btn);
  border: 1px solid var(--btn-border);
  color: var(--green);
  font-family: 'Share Tech Mono', monospace;
  font-size: 15px;
  padding: 12px 10px;
  border-radius: 7px;
  outline: none;
}
.custom-in::placeholder { color: var(--green-dim); }
.custom-in:focus { border-color: var(--green-dim); }

.send-btn {
  background: var(--green-dim);
  border: 1px solid var(--green-mid);
  color: var(--green);
  font-family: 'Orbitron', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  padding: 12px 14px;
  border-radius: 7px;
  cursor: pointer;
  white-space: nowrap;
}
.send-btn:active { opacity: 0.6; }

/* ─── SHARE OVERLAY ─── */
#share-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.92);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  z-index: 100;
  padding: 20px;
}
#share-overlay.hidden { display: none; }

.share-box {
  background: var(--panel);
  border: 1px solid var(--btn-border);
  border-radius: 14px;
  padding: 24px;
  width: 100%;
  max-width: 300px;
  text-align: center;
}

.share-box .card-label { margin-bottom: 16px; }

.qr-wrap {
  background: white;
  border-radius: 8px;
  padding: 10px;
  display: inline-block;
  margin: 0 auto 16px;
}

.room-code-big {
  font-family: 'Orbitron', monospace;
  font-size: 28px;
  letter-spacing: 6px;
  color: var(--green);
  text-shadow: 0 0 16px var(--green-glow);
  padding: 8px 0;
}

.close-share {
  background: none;
  border: 1px solid var(--btn-border);
  color: var(--green-dim);
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px;
  letter-spacing: 2px;
  padding: 10px 30px;
  border-radius: 20px;
  cursor: pointer;
}

/* ─── DISPLAY (iPAD) ─── */
#display {
  background: var(--bg);
}

.brand-row {
  font-family: 'Orbitron', monospace;
  font-size: 10px;
  letter-spacing: 8px;
  color: var(--green-dim);
  text-transform: uppercase;
  margin-bottom: 12px;
}

.lcd-outer {
  width: 95%;
  max-width: 800px;
  background: var(--display-bg);
  border: 3px solid #0d2a14;
  border-radius: 10px;
  padding: 24px 32px 28px;
  position: relative;
  box-shadow: 
    0 0 60px rgba(57,255,90,0.1),
    inset 0 0 30px rgba(0,0,0,0.6);
}

/* scanlines effect */
.lcd-outer::after {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 3px,
    rgba(0,0,0,0.06) 3px,
    rgba(0,0,0,0.06) 4px
  );
  pointer-events: none;
  border-radius: 8px;
}

.lcd-sub {
  font-size: 10px;
  letter-spacing: 4px;
  color: var(--green-dim);
  text-align: left;
  margin-bottom: 20px;
  font-family: 'Share Tech Mono', monospace;
}

#disp-value {
  font-family: 'Orbitron', monospace;
  font-weight: 900;
  font-size: clamp(60px, 14vw, 160px);
  color: var(--green);
  text-align: right;
  text-shadow:
    0 0 20px var(--green),
    0 0 50px rgba(57,255,90,0.4),
    0 0 100px rgba(57,255,90,0.15);
  letter-spacing: 4px;
  min-height: 1.15em;
  word-break: break-all;
  line-height: 1.05;
  transition: opacity 0.1s;
}

.cursor-blink {
  animation: blink 1s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

.disp-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 18px;
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--green-dim);
}

#disp-live-status {
  display: flex;
  align-items: center;
  gap: 6px;
}

/* loading spinner for blinking dot */
@keyframes pulse {
  0%,100%{opacity:1;transform:scale(1)}
  50%{opacity:0.3;transform:scale(0.8)}
}
.live-pulse { animation: pulse 1.2s ease-in-out infinite; }
</style>
</head>
<body>

<!-- ══════════════ SETUP SCREEN ══════════════ -->
<div class="screen" id="setup">
  <div class="logo">📟 Taschenrechner Kostüm · Live</div>

  <div class="big-card">
    <div class="card-label">Steuerung starten (Handy)</div>
    <button class="pill-btn" id="btn-create" onclick="createRoom()">⚡ Neue Session starten</button>
    <div id="setup-loading" style="font-size:11px;letter-spacing:3px;color:var(--green-dim);text-align:center;min-height:18px;"></div>
  </div>

  <div class="big-card">
    <div class="card-label">Display öffnen (iPad)</div>
    <input class="room-input" id="code-input" placeholder="CODE EINGEBEN" maxlength="9" oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'')">
    <button class="pill-btn" onclick="joinDisplay()">📺 Als Display öffnen</button>
  </div>

  <div id="setup-error"></div>
</div>

<!-- ══════════════ CONTROLLER ══════════════ -->
<div class="screen hidden" id="ctrl">
  <div class="ctrl-topbar">
    <div>
      <span class="status-dot" id="dot"></span>
      <span id="ctrl-room">ROOM: —</span>
    </div>
    <button class="share-pill" onclick="openShare()">📡 TEILEN</button>
  </div>

  <div class="ctrl-display" id="ctrl-disp">0</div>

  <div class="calc-grid">
    <button class="c-btn fn" onclick="p('C')">C</button>
    <button class="c-btn fn" onclick="p('⌫')">⌫</button>
    <button class="c-btn fn" onclick="p('%')">%</button>
    <button class="c-btn op" onclick="p('÷')">÷</button>

    <button class="c-btn" onclick="p('7')">7</button>
    <button class="c-btn" onclick="p('8')">8</button>
    <button class="c-btn" onclick="p('9')">9</button>
    <button class="c-btn op" onclick="p('×')">×</button>

    <button class="c-btn" onclick="p('4')">4</button>
    <button class="c-btn" onclick="p('5')">5</button>
    <button class="c-btn" onclick="p('6')">6</button>
    <button class="c-btn op" onclick="p('−')">−</button>

    <button class="c-btn" onclick="p('1')">1</button>
    <button class="c-btn" onclick="p('2')">2</button>
    <button class="c-btn" onclick="p('3')">3</button>
    <button class="c-btn op" onclick="p('+')">+</button>

    <button class="c-btn fn" onclick="p('±')">±</button>
    <button class="c-btn" onclick="p('0')">0</button>
    <button class="c-btn" onclick="p(',')">.</button>
    <button class="c-btn eq" onclick="p('=')">=</button>
  </div>

  <div class="custom-row">
    <input class="custom-in" id="custom-in" placeholder="z.B. 'ERROR' oder eigener Text…" maxlength="50">
    <button class="send-btn" onclick="sendText()">SEND</button>
  </div>
</div>

<!-- ══════════════ SHARE OVERLAY ══════════════ -->
<div id="share-overlay" class="hidden">
  <div class="share-box">
    <div class="card-label">iPad: QR scannen oder Code eingeben</div>
    <div class="qr-wrap">
      <img id="qr-img" width="160" height="160" alt="QR Code">
    </div>
    <div class="room-code-big" id="share-code-big"></div>
    <div style="font-size:9px;color:var(--green-dim);letter-spacing:2px;margin-bottom:12px;">CODE AUF iPAD EINGEBEN</div>
  </div>
  <button class="close-share" onclick="closeShare()">SCHLIESSEN</button>
</div>

<!-- ══════════════ DISPLAY (iPAD) ══════════════ -->
<div class="screen hidden" id="display">
  <div class="brand-row">CASIO &nbsp;·&nbsp; MATHE LK &nbsp;·&nbsp; fx-9750GIII</div>

  <div class="lcd-outer">
    <div class="lcd-sub">▶ ANS &nbsp;&nbsp; RAD &nbsp;&nbsp; CMPLX</div>
    <div id="disp-value">0<span class="cursor-blink">_</span></div>
    <div class="disp-footer">
      <span>MATHE LK 2026 · ABITUR</span>
      <span id="disp-live-status">
        <span class="status-dot live-pulse" id="disp-dot"></span>
        <span id="disp-status-text">VERBINDE...</span>
      </span>
    </div>
  </div>
</div>


<script>
// ─────────────────────────────────────────────
//  CONFIG — kvdb.io free key-value store
//  No account needed, instant bucket creation
// ─────────────────────────────────────────────
const KV = 'https://kvdb.io';
let bucket = null;
let val = '0';
let isBusy = false;
let pollTimer = null;
let lastSeen = '';

// ─── SETUP ────────────────────────────────────

async function createRoom() {
  const btn = document.getElementById('btn-create');
  const loading = document.getElementById('setup-loading');
  btn.disabled = true;
  loading.textContent = 'VERBINDE...';
  try {
    const res = await fetch(`${KV}/`, { method: 'POST', headers: { 'Content-Type': 'application/json' } });
    if (!res.ok) throw new Error();
    const data = await res.json();
    bucket = data.bucket;
    // init the key
    await fetch(`${KV}/${bucket}/display`, { method: 'PUT', body: '0', headers: { 'Content-Type': 'text/plain' } });
    startController();
  } catch {
    loading.textContent = '';
    document.getElementById('setup-error').textContent = 'FEHLER – Netz prüfen & nochmal versuchen';
    btn.disabled = false;
  }
}

function joinDisplay() {
  const code = document.getElementById('code-input').value.trim();
  if (code.length < 6) {
    document.getElementById('setup-error').textContent = 'Bitte vollständigen Code eingeben';
    return;
  }
  bucket = code;
  startDisplay();
}

// ─── CONTROLLER ───────────────────────────────

function startController() {
  show('ctrl');
  document.getElementById('ctrl-room').textContent = 'ROOM: ' + bucket;
}

function p(btn) {
  if (btn === 'C') { val = '0'; }
  else if (btn === '⌫') { val = val.length > 1 ? val.slice(0,-1) : '0'; }
  else if (btn === '=') {
    try {
      let e = val.replace(/÷/g,'/').replace(/×/g,'*').replace(/−/g,'-').replace(/,/g,'.');
      let r = Function('"use strict";return (' + e + ')')();
      val = Number.isInteger(r) ? String(r) : parseFloat(r.toFixed(10)).toString().replace('.',',');
    } catch { val = 'ERROR'; }
  }
  else if (btn === '±') { val = val.startsWith('-') ? val.slice(1) : (val!=='0' ? '-'+val : '0'); }
  else if (btn === '%') {
    try { val = String(parseFloat(val.replace(',','.'))/100); } catch { val='ERROR'; }
  }
  else {
    if (val === '0' && /\d/.test(btn)) val = btn;
    else val += btn;
  }
  document.getElementById('ctrl-disp').textContent = val;
  push(val);
}

function sendText() {
  const t = document.getElementById('custom-in').value.trim();
  if (!t) return;
  val = t;
  document.getElementById('ctrl-disp').textContent = t;
  document.getElementById('custom-in').value = '';
  push(t);
}

async function push(v) {
  if (!bucket || isBusy) return;
  isBusy = true;
  try {
    await fetch(`${KV}/${bucket}/display`, {
      method: 'PUT',
      body: encodeURIComponent(v),
      headers: { 'Content-Type': 'text/plain' }
    });
    setDot('live');
  } catch { setDot('err'); }
  isBusy = false;
}

function setDot(state) {
  const dot = document.getElementById('dot');
  if (!dot) return;
  dot.style.background = state==='live' ? 'var(--green)' : (state==='err' ? '#ff4444' : 'var(--green-dim)');
  dot.style.boxShadow = state==='live' ? '0 0 6px var(--green)' : 'none';
}

// ─── DISPLAY ──────────────────────────────────

function startDisplay() {
  show('display');
  pollTimer = setInterval(poll, 700);
  poll();
}

async function poll() {
  if (!bucket) return;
  try {
    const res = await fetch(`${KV}/${bucket}/display`);
    if (!res.ok) return;
    const raw = await res.text();
    const text = decodeURIComponent(raw.trim());
    if (text && text !== lastSeen) {
      lastSeen = text;
      updateDisplay(text);
      document.getElementById('disp-status-text').textContent = 'LIVE ●';
      document.getElementById('disp-dot').style.background = 'var(--green)';
    }
  } catch {
    document.getElementById('disp-status-text').textContent = 'OFFLINE ○';
    document.getElementById('disp-dot').style.background = '#ff4444';
  }
}

function updateDisplay(v) {
  const el = document.getElementById('disp-value');
  el.style.opacity = '0.2';
  setTimeout(() => {
    el.innerHTML = v + '<span class="cursor-blink">_</span>';
    el.style.opacity = '1';
  }, 60);
}

// ─── SHARE ────────────────────────────────────

function openShare() {
  const dispUrl = location.origin + location.pathname + '?room=' + bucket + '&mode=display';
  document.getElementById('share-code-big').textContent = bucket;
  document.getElementById('qr-img').src =
    'https://api.qrserver.com/v1/create-qr-code/?size=160x160&color=000000&bgcolor=ffffff&data=' +
    encodeURIComponent(dispUrl);
  document.getElementById('share-overlay').classList.remove('hidden');
}

function closeShare() {
  document.getElementById('share-overlay').classList.add('hidden');
}

// ─── UTILS ────────────────────────────────────

function show(id) {
  ['setup','ctrl','display'].forEach(s => {
    document.getElementById(s).classList.toggle('hidden', s !== id);
  });
}

// ─── AUTO-START from URL ───────────────────────
(function() {
  const p = new URLSearchParams(location.search);
  const room = p.get('room');
  const mode = p.get('mode');
  if (room && mode === 'display') {
    bucket = room;
    startDisplay();
  }
})();
</script>
</body>
</html>
