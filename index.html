<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Taschenrechner Kostüm v2</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

:root {
  --bg: #080c08;
  --panel: #111811;
  --display-bg: #061006;
  --green: #39ff5a;
  --green-mid: #22cc3a;
  --green-dim: #0d4a18;
  --green-glow: rgba(57,255,90,0.25);
  --amber: #ffb830;
  --blue-op: #4fc3f7;
  --red-fn: #ff6b6b;
  --btn: #141a14;
  --btn-border: #1e2a1e;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--green); font-family: 'Share Tech Mono', monospace; min-height: 100vh; overflow: hidden; }

.screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; transition: opacity 0.3s; }
.screen.hidden { opacity: 0; pointer-events: none; }
  /* Verhindert, dass EINGABE und ERGEBNIS gleichzeitig angezeigt werden */
#disp-expr.hidden, #disp-result.hidden { display: none !important; }

/* ─── SETUP ─── */
#setup { gap: 14px; }
.logo { font-family: 'Orbitron', monospace; font-size: 11px; letter-spacing: 5px; color: var(--green-dim); margin-bottom: 4px; }
.big-card { background: var(--panel); border: 1px solid var(--btn-border); border-radius: 12px; padding: 20px; width: 100%; max-width: 340px; }
.card-label { font-size: 9px; letter-spacing: 4px; color: var(--green-dim); text-transform: uppercase; margin-bottom: 12px; }
.pill-btn { width: 100%; background: var(--green-dim); border: 1px solid var(--green-mid); color: var(--green); font-family: 'Orbitron', monospace; font-size: 12px; letter-spacing: 3px; padding: 14px; border-radius: 8px; cursor: pointer; margin-bottom: 8px; transition: all 0.1s; }
.pill-btn:active { opacity: 0.6; transform: scale(0.97); }
.pill-btn:disabled { opacity: 0.4; }
.room-input { width: 100%; background: var(--btn); border: 1px solid var(--btn-border); color: var(--green); font-family: 'Orbitron', monospace; font-size: 20px; padding: 12px; border-radius: 8px; text-align: center; letter-spacing: 5px; outline: none; margin-bottom: 10px; }
.room-input::placeholder { color: var(--green-dim); letter-spacing: 3px; font-size: 14px; }

.disp-picker { display: flex; gap: 8px; margin-bottom: 10px; }
.disp-pick-btn { flex: 1; background: var(--btn); border: 2px solid var(--btn-border); color: var(--green-dim); font-family: 'Orbitron', monospace; font-size: 10px; letter-spacing: 2px; padding: 10px 4px; border-radius: 8px; cursor: pointer; transition: all 0.1s; text-align: center; }
.disp-pick-btn.active { border-color: var(--green-mid); color: var(--green); background: var(--green-dim); }

#setup-error { font-size: 10px; color: var(--red-fn); letter-spacing: 2px; text-align: center; min-height: 16px; }
#setup-loading { font-size: 10px; letter-spacing: 3px; color: var(--green-dim); text-align: center; min-height: 16px; }

/* ─── CONTROLLER ─── */
#ctrl { justify-content: flex-start; padding: 10px 12px 8px; gap: 0; overflow-y: auto; max-width: 420px; margin: 0 auto; width: 100%; }
.ctrl-topbar { display: flex; align-items: center; justify-content: space-between; width: 100%; padding: 0 0 6px 0; font-size: 9px; letter-spacing: 3px; color: var(--green-dim); }
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green-dim); display: inline-block; margin-right: 5px; transition: background 0.3s; }
.status-dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); }
.share-pill { background: none; border: 1px solid var(--btn-border); color: var(--green-dim); font-family: 'Orbitron', monospace; font-size: 8px; letter-spacing: 2px; padding: 4px 10px; border-radius: 20px; cursor: pointer; }

/* Two mini displays on controller */
.ctrl-dual { display: flex; gap: 6px; width: 100%; margin-bottom: 8px; }
.ctrl-disp-wrap { flex: 1; background: var(--display-bg); border: 2px solid var(--green-dim); border-radius: 7px; padding: 6px 10px; }
.ctrl-disp-label { font-size: 8px; letter-spacing: 3px; color: var(--green-dim); margin-bottom: 2px; }
.ctrl-disp-val { font-family: 'Orbitron', monospace; font-size: clamp(16px, 5vw, 26px); color: var(--green); text-shadow: 0 0 8px var(--green-glow); text-align: right; min-height: 1.2em; word-break: break-all; }
.ctrl-disp-val.result { color: var(--amber); text-shadow: 0 0 8px rgba(255,184,48,0.3); }

.calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; width: 100%; margin-bottom: 8px; }
.c-btn { background: var(--btn); border: 1px solid var(--btn-border); color: var(--green); font-family: 'Orbitron', monospace; font-size: clamp(14px, 4.5vw, 22px); padding: 14px 0; border-radius: 7px; cursor: pointer; transition: all 0.08s; user-select: none; }
.c-btn:active { background: var(--green-dim); box-shadow: 0 0 12px var(--green-glow); transform: scale(0.93); }
.c-btn.op { color: var(--blue-op); }
.c-btn.fn { color: var(--red-fn); }
.c-btn.eq { background: var(--green-dim); color: var(--green); box-shadow: 0 0 10px var(--green-glow); }

.custom-row { display: flex; gap: 6px; width: 100%; }
.custom-in { flex: 1; background: var(--btn); border: 1px solid var(--btn-border); color: var(--green); font-family: 'Share Tech Mono', monospace; font-size: 15px; padding: 11px 10px; border-radius: 7px; outline: none; }
.custom-in::placeholder { color: var(--green-dim); }
.send-btn { background: var(--green-dim); border: 1px solid var(--green-mid); color: var(--green); font-family: 'Orbitron', monospace; font-size: 10px; letter-spacing: 2px; padding: 11px 12px; border-radius: 7px; cursor: pointer; white-space: nowrap; }
.send-btn:active { opacity: 0.6; }

/* ─── SHARE OVERLAY ─── */
#share-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.93); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; z-index: 100; padding: 20px; }
#share-overlay.hidden { display: none; }
.share-box { background: var(--panel); border: 1px solid var(--btn-border); border-radius: 14px; padding: 20px; width: 100%; max-width: 320px; text-align: center; }
.qr-wrap { background: white; border-radius: 8px; padding: 8px; display: inline-block; margin: 0 auto 12px; }
.room-code-big { font-family: 'Orbitron', monospace; font-size: 26px; letter-spacing: 6px; color: var(--green); text-shadow: 0 0 16px var(--green-glow); padding: 6px 0; }
.close-share { background: none; border: 1px solid var(--btn-border); color: var(--green-dim); font-family: 'Share Tech Mono', monospace; font-size: 12px; letter-spacing: 2px; padding: 10px 30px; border-radius: 20px; cursor: pointer; }
.share-tabs { display: flex; gap: 8px; width: 100%; max-width: 320px; }
.share-tab { flex: 1; background: var(--panel); border: 1px solid var(--btn-border); border-radius: 10px; padding: 14px 8px; text-align: center; }
.share-tab-label { font-size: 8px; letter-spacing: 3px; color: var(--green-dim); margin-bottom: 6px; }
.share-tab-title { font-family: 'Orbitron', monospace; font-size: 11px; color: var(--green); margin-bottom: 8px; }

/* ─── DISPLAY ─── */
#display { background: var(--bg); }

/* EXPRESSION display (iPad 1) — left-aligned, shows what's being typed */
.lcd-outer { width: 95%; max-width: 900px; background: var(--display-bg); border: 3px solid #0d2a14; border-radius: 10px; padding: 24px 36px 28px; position: relative; box-shadow: 0 0 60px rgba(57,255,90,0.1), inset 0 0 30px rgba(0,0,0,0.6); }
.lcd-outer::after { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px); pointer-events: none; border-radius: 8px; }
.lcd-sub { font-size: 10px; letter-spacing: 4px; color: var(--green-dim); margin-bottom: 16px; font-family: 'Share Tech Mono', monospace; }
.lcd-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; font-size: 10px; letter-spacing: 3px; color: var(--green-dim); }

/* EXPR screen */
/* EXPR screen (iPad 1) */
/* EINGABE (iPad 1) */
#disp-expr {
  font-family: 'Orbitron', monospace;
  font-weight: 700;
  color: var(--green);
  text-align: right;
  text-shadow: 0 0 20px var(--green);
  letter-spacing: 2px;
  
  /* AUTOMATISCHE SCHRIFTGRÖSSE */
  font-size: 80px; /* Startgröße */
  display: block;
  width: 100%;
  height: 1.2em;
  line-height: 1.2em;
  white-space: nowrap;
  overflow: hidden;
  
  /* Der Trick: Wenn der Text zu lang ist, wird er gestaucht oder wir nutzen Viewport-Units */
  font-size: clamp(20px, 8vw, 90px); 
}

/* ERGEBNIS (iPad 2) */
#disp-result {
  font-family: 'Orbitron', monospace;
  font-weight: 900;
  color: var(--amber);
  text-align: left;
  text-shadow: 0 0 24px var(--amber);
  letter-spacing: 4px;
  padding-left: 10px;

  /* AUTOMATISCHE SCHRIFTGRÖSSE */
  font-size: clamp(20px, 8vw, 90px);
  display: block;
  width: 100%;
  height: 1.2em;
  line-height: 1.2em;
  white-space: nowrap;
  overflow: hidden;
}

/* Damit die Box drumherum immer gleich groß bleibt */
.lcd-outer {
  width: 95vw;
  height: 250px; /* Hier eine feste Pixel-Höhe passend zu deinem Ausschnitt wählen! */
  display: flex;
  flex-direction: column;
  justify-content: center; /* Zentriert den Inhalt vertikal im Ausschnitt */
  background: var(--display-bg);
  border: 3px solid #0d2a14;
  border-radius: 10px;
  padding: 20px;
  box-sizing: border-box;
}
/* equals prefix */
.eq-prefix { color: var(--green-dim); font-size: 0.55em; vertical-align: middle; margin-right: 8px; }

.brand-row { font-family: 'Orbitron', monospace; font-size: 10px; letter-spacing: 8px; color: var(--green-dim); text-transform: uppercase; margin-bottom: 12px; }

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
.cursor-blink { animation: blink 1s step-end infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.3;transform:scale(0.8)} }
.live-pulse { animation: pulse 1.2s ease-in-out infinite; }
</style>
</head>
<body>
<audio id="snd-click" preload="auto">
  <source src="dragon-studio-typing-keyboard-asmr-356116.mp3" type="audio/mpeg">
</audio>
<audio id="snd-bing" preload="auto">
  <source src="freesound_community-piglevelwin2mp3-14800.mp3" type="audio/mpeg">
</audio>
  
<!-- ══════════════ SETUP ══════════════ -->
<div class="screen" id="setup">
  <div class="logo">📟 TASCHENRECHNER KOSTÜM · v2</div>

  <div class="big-card">
    <div class="card-label">Steuerung starten (Handy)</div>
    <button class="pill-btn" id="btn-create" onclick="createRoom()">⚡ Neue Session starten</button>
    <div id="setup-loading"></div>
  </div>

  <div class="big-card">
    <div class="card-label">Display öffnen (iPad)</div>
    <input class="room-input" id="code-input" placeholder="CODE EINGEBEN" maxlength="9" oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'')">
    <div class="disp-picker">
      <button class="disp-pick-btn active" id="pick1" onclick="pickDisp(1)">
        📟 iPAD 1<br><span style="font-size:8px;letter-spacing:1px;color:var(--green-dim)">EINGABE</span>
      </button>
      <button class="disp-pick-btn" id="pick2" onclick="pickDisp(2)">
        🟡 iPAD 2<br><span style="font-size:8px;letter-spacing:1px;color:var(--green-dim)">ERGEBNIS</span>
      </button>
    </div>
    <button class="pill-btn" onclick="joinDisplay()">📺 Als Display öffnen</button>
  </div>

  <div id="setup-error"></div>
</div>

<!-- ══════════════ CONTROLLER ══════════════ -->
<div class="screen hidden" id="ctrl">
  <div class="ctrl-topbar">
    <div><span class="status-dot" id="dot"></span><span id="ctrl-room">ROOM: —</span></div>
    <button class="share-pill" onclick="openShare()">📡 TEILEN</button>
  </div>

  <div class="ctrl-dual">
    <div class="ctrl-disp-wrap">
      <div class="ctrl-disp-label">iPAD 1 · EINGABE</div>
      <div class="ctrl-disp-val" id="ctrl-expr">0</div>
    </div>
    <div class="ctrl-disp-wrap">
      <div class="ctrl-disp-label">iPAD 2 · ERGEBNIS</div>
      <div class="ctrl-disp-val result" id="ctrl-result">—</div>
    </div>
  </div>

  <div class="calc-grid">
    <button class="c-btn fn" onclick="p('C')">C</button>
    <button class="c-btn fn" onclick="p('⌫')">⌫</button>
    <button class="c-btn fn" onclick="p('%')">%</button>
    <button class="c-btn op" onclick="p('÷')">÷</button>
    <button class="c-btn" onclick="p('7')">7</button>
    <button class="c-btn" onclick="p('8')">8</button>
    <button class="c-btn" onclick="p('9')">9</button>
    <button class="c-btn op" onclick="p('×')">×</button>
    <button class="c-btn" onclick="p('4')">4</button>
    <button class="c-btn" onclick="p('5')">5</button>
    <button class="c-btn" onclick="p('6')">6</button>
    <button class="c-btn op" onclick="p('−')">−</button>
    <button class="c-btn" onclick="p('1')">1</button>
    <button class="c-btn" onclick="p('2')">2</button>
    <button class="c-btn" onclick="p('3')">3</button>
    <button class="c-btn op" onclick="p('+')">+</button>
    <button class="c-btn fn" onclick="p('±')">±</button>
    <button class="c-btn" onclick="p('0')">0</button>
    <button class="c-btn" onclick="p(',')">.</button>
    <button class="c-btn eq" onclick="p('=')">=</button>
  </div>

  <div class="custom-row">
    <input class="custom-in" id="custom-in" placeholder="Eigener Text auf beiden Displays…" maxlength="40">
    <button class="send-btn" onclick="sendText()">SEND</button>
  </div>
</div>

<!-- ══════════════ SHARE OVERLAY ══════════════ -->
<div id="share-overlay" class="hidden">
  <div style="font-size:9px;letter-spacing:4px;color:var(--green-dim);margin-bottom:4px;">BEIDE IPADS VERBINDEN</div>
  <div class="share-tabs">
    <div class="share-tab">
      <div class="share-tab-label">iPAD 1 · EINGABE</div>
      <div class="qr-wrap"><img id="qr1" width="120" height="120"></div>
      <div class="room-code-big" style="font-size:18px;" id="share-code1"></div>
      <div style="font-size:8px;color:var(--green-dim);letter-spacing:1px;">Code eingeben → iPad 1</div>
    </div>
    <div class="share-tab">
      <div class="share-tab-label">iPAD 2 · ERGEBNIS</div>
      <div class="qr-wrap"><img id="qr2" width="120" height="120"></div>
      <div class="room-code-big" style="font-size:18px;" id="share-code2"></div>
      <div style="font-size:8px;color:var(--green-dim);letter-spacing:1px;">Code eingeben → iPad 2</div>
    </div>
  </div>
  <button class="close-share" onclick="closeShare()">SCHLIESSEN</button>
</div>

<!-- ══════════════ DISPLAY ══════════════ -->
<div class="screen hidden" id="display">
  <div class="brand-row" id="disp-brand">CASIO · fx-9750GIII</div>
  <div class="lcd-outer">
    <div class="lcd-sub" id="lcd-sub">▶ ANS &nbsp; RAD &nbsp; CMPLX</div>
    <!-- iPad 1: expression -->
    <div id="disp-expr" class="hidden">0<span class="cursor-blink">_</span></div>
    <!-- iPad 2: result -->
    <div id="disp-result" class="hidden"><span class="eq-prefix">=</span><span id="result-val">—</span></div>
    <div class="lcd-footer">
      <span id="disp-footer-label">MATHE LK 2026</span>
      <span style="display:flex;align-items:center;gap:6px;">
        <span class="status-dot live-pulse" id="disp-dot"></span>
        <span id="disp-status">VERBINDE…</span>
      </span>
    </div>
  </div>
</div>


<script>
// HIER DEINEN LINK EINFÜGEN (muss mit .json enden!)
const DB_URL = "https://taschenrechner-mottowoche-default-rtdb.europe-west1.firebasedatabase.app/";

let bucket = null;
let dispMode = 0; // 1 = expr, 2 = result
let pickMode = 1;
let expr = '0';
let isCustomText = false;
let result = '—';
let pollTimer = null;
let lastExpr = '';
let lastResult = '';
let isBusy = false;
let needsUpdate = false;

// ─── SETUP ────────────────────────────────────
function pickDisp(n) {
  pickMode = n;
  document.getElementById('pick1').classList.toggle('active', n===1);
  document.getElementById('pick2').classList.toggle('active', n===2);
}

async function createRoom() {
  const btn = document.getElementById('btn-create');
  const loading = document.getElementById('setup-loading');
  btn.disabled = true;
  loading.textContent = 'VERBINDE...';
  
  // Erzeugt einen zufälligen Raum-Code wie R1234
  bucket = 'R' + Math.floor(1000 + Math.random() * 9000);
  
  try {
    // Initialen Wert in Firebase speichern
    await push('0', '—');
    startController();
  } catch (err) {
    loading.textContent = '';
    document.getElementById('setup-error').textContent = 'FEHLER - Firebase Link prüfen!';
    btn.disabled = false;
  }
}

function joinDisplay() {
  const code = document.getElementById('code-input').value.trim();
  if (code.length < 3) { document.getElementById('setup-error').textContent = 'Code zu kurz'; return; }
  bucket = code;
  dispMode = pickMode;

  // --- AUDIO UNLOCK START ---
  // Wir spielen die Sounds kurz lautlos an, damit Safari sie später erlaubt
  const s1 = document.getElementById('snd-click');
  const s2 = document.getElementById('snd-bing');
  if(s1) { s1.play().then(() => { s1.pause(); s1.currentTime = 0; }).catch(e => console.log(e)); }
  if(s2) { s2.play().then(() => { s2.pause(); s2.currentTime = 0; }).catch(e => console.log(e)); }
  // --- AUDIO UNLOCK ENDE ---

  // VOLLBILD STARTEN
  const el = document.documentElement;
  const rfs = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
  if (rfs) {
    rfs.call(el).catch(err => console.log("Fullscreen blocked: ", err));
  }

  startDisplay();
}
// ─── CONTROLLER ───────────────────────────────
function startController() {
  show('ctrl');
  document.getElementById('ctrl-room').textContent = 'ROOM: ' + bucket;
}

function p(btn) {
  isCustomText = false;
  // Sound nur abspielen, wenn NICHT 'C' gedrückt wird
  if (btn !== 'C') {
    // Da wir hier auf dem Controller sind, senden wir den Befehl an Firebase.
    // Der Sound wird dann auf dem iPad (Display) ausgelöst, sobald dort die Daten ankommen.
  }

  if (btn === 'C') { 
    expr = '0'; 
    result = '—'; 
  }
  else if (btn === '⌫') { expr = expr.length > 1 ? expr.slice(0,-1) : '0'; }
  else if (btn === '=') {
    try {
      let e = expr.replace(/÷/g,'/').replace(/×/g,'*').replace(/−/g,'-').replace(/,/g,'.');
      let r = Function('"use strict";return (' + e + ')')();
      result = Number.isInteger(r) ? String(r) : parseFloat(r.toFixed(10)).toString().replace('.',',');
    } catch { result = 'ERROR'; }
  } else if (btn === '±') {
    expr = expr.startsWith('-') ? expr.slice(1) : (expr!=='0' ? '-'+expr : '0');
  } else if (btn === '%') {
    try { 
        let e = expr.replace(/÷/g,'/').replace(/×/g,'*').replace(/−/g,'-').replace(/,/g,'.');
        let r = Function('"use strict";return (' + e + ')')() / 100;
        expr = String(r).replace('.',',');
        p('=');
    } catch { result = 'ERROR'; }
  } else {
    if (expr === '0' && /\d/.test(btn)) expr = btn;
    else expr += btn;
  }
  document.getElementById('ctrl-expr').textContent = expr;
  document.getElementById('ctrl-result').textContent = result;
  push(expr, result);
}
function sendText() {
  const t = document.getElementById('custom-in').value.trim();
  if (!t) return;

  isCustomText = true; // SOUNDS DEAKTIVIEREN

  let mid = Math.floor(t.length / 2);
  let splitIndex = t.indexOf(' ', mid);
  if (splitIndex === -1) splitIndex = mid;

  let part1 = t.substring(0, splitIndex).trim();
  let part2 = t.substring(splitIndex).trim();

  expr = part1;
  result = part2;

  document.getElementById('ctrl-expr').textContent = part1;
  document.getElementById('ctrl-result').textContent = part2;
  document.getElementById('custom-in').value = '';

  push(part1, part2);
  
  // Nach kurzem Delay wieder für normales Tippen freigeben
  setTimeout(() => { isCustomText = false; }, 1000);
}

async function push(e, r) {
  if (isBusy) {
    needsUpdate = true;
    return;
  }
  isBusy = true;
  needsUpdate = false;

  try {
    // Hier wird jetzt auch der Status "custom" mitgesendet!
    await fetch(`${DB_URL}${bucket}.json`, { 
      method: 'PATCH', 
      body: JSON.stringify({ 
        expr: e, 
        result: r, 
        custom: isCustomText // Das iPad erfährt so, ob es ein Custom-Text ist
      }) 
    });
    setDot('live');
  } catch (err) { 
    setDot('err'); 
    console.error("Firebase Error:", err);
  } finally {
    isBusy = false;
    if (needsUpdate) push(expr, result);
  }
}

function setDot(s) {
  const dot = document.getElementById('dot');
  if (!dot) return;
  dot.style.background = s==='live' ? 'var(--green)' : (s==='err' ? '#ff4444' : 'var(--green-dim)');
  dot.style.boxShadow = s==='live' ? '0 0 6px var(--green)' : 'none';
}

// ─── DISPLAY ──────────────────────────────────
function startDisplay() {
  show('display');
  const isResult = dispMode === 2;
  document.getElementById('disp-expr').classList.toggle('hidden', isResult);
  document.getElementById('disp-result').classList.toggle('hidden', !isResult);
  document.getElementById('disp-brand').textContent = isResult
    ? 'CASIO · fx-9750GIII · ERGEBNIS'
    : 'CASIO · fx-9750GIII · EINGABE';
  
  pollDisplay(); // Startet die Abfrage-Schleife
}

async function pollDisplay() {
  if (!bucket) return;
  try {
    const res = await fetch(`${DB_URL}${bucket}.json`);
    const data = await res.json();
    
    if (data) {
      // WICHTIG: Das iPad übernimmt hier die Info vom Handy
      isCustomText = data.custom || false; 
      
      const val = dispMode === 1 ? data.expr : data.result;
      const last = dispMode === 1 ? lastExpr : lastResult;
      
      if (val !== undefined && val !== last) {
        if (dispMode === 1) { lastExpr = val; updateExprDisplay(val); }
        else { lastResult = val; updateResultDisplay(val); }
        document.getElementById('disp-status').textContent = 'LIVE ●';
        document.getElementById('disp-dot').style.background = 'var(--green)';
      }
    }
  } catch (err) {
    // ... restlicher Catch-Block
    document.getElementById('disp-status').textContent = 'OFFLINE ○';
    document.getElementById('disp-dot').style.background = '#ff4444';
  } finally {
    // Wartet 500ms und fragt dann erneut ab (verhindert Race Conditions)
    pollTimer = setTimeout(pollDisplay, 500);
  }
}

let typingTimer = null;

function manageTypingSound(start) {
  const typingSound = document.getElementById('snd-click');
  if (!typingSound) return;

  if (start) {
    // Wenn der Wert "0" ist (nach C), Sound gar nicht erst starten
    if (lastExpr === '0') {
        typingSound.pause();
        typingSound.currentTime = 0;
        return;
    }

    if (typingSound.paused) {
      typingSound.play().catch(() => {});
    }

    // Timer: Stoppt den Sound nach 1.5 Sek Inaktivität
    clearTimeout(typingTimer);
    typingTimer = setTimeout(() => {
      typingSound.pause();
      // Wir lassen currentTime so, wie sie ist, damit er beim nächsten Mal 
      // an einer anderen Stelle der Tastatur-Aufnahme weitermacht. 
      // Wenn er am Ende ist, springt er durch die nächste Zeile automatisch zum Start:
      if (typingSound.currentTime >= typingSound.duration - 0.1) {
          typingSound.currentTime = 0;
      }
    }, 1500);
  }
}

// Damit der 8-Sekunden Sound von vorne anfängt, wenn er doch mal komplett durchläuft:
document.getElementById('snd-click').onended = function() {
    this.currentTime = 0;
    this.pause();
};

function playBing() {
  const bingSound = document.getElementById('snd-bing'); // FIX
  if (bingSound) {
    bingSound.currentTime = 0;
    bingSound.play().catch(() => {});
  }
}

// UPDATE EINGABE (iPad 1)
// UPDATE EINGABE (iPad 1)
function updateExprDisplay(v) {
  const el = document.getElementById('disp-expr');
  
  // Nur Sound wenn: iPad 1 UND kein Custom Text UND nicht gelöscht
  if (dispMode === 1 && !isCustomText && v !== '0') { 
    manageTypingSound(true); 
  } else if (v === '0' || isCustomText) {
    const s = document.getElementById('snd-click');
    if(s) { s.pause(); s.currentTime = 0; }
  }

  // Text anzeigen... (wie bisher)
  el.style.opacity = '1';
  el.innerHTML = v + '<span class="cursor-blink">_</span>';
}

// UPDATE ERGEBNIS (iPad 2)
function updateResultDisplay(v) {
  const el = document.getElementById('disp-result');
  
  // Nur Sound wenn: iPad 2 UND kein Custom Text UND nicht gelöscht
  if (dispMode === 2 && !isCustomText && v !== '—') {
    playBing(); 
  }

  // Text anzeigen... (wie bisher)
  el.innerHTML = `<span class="eq-prefix">=</span><span id="result-val">${v}</span>`;
}

// ─── SHARE ────────────────────────────────────
function openShare() {
  const base = location.origin + location.pathname;
  const url1 = `${base}?room=${bucket}&mode=1`;
  const url2 = `${base}?room=${bucket}&mode=2`;
  document.getElementById('share-code1').textContent = bucket;
  document.getElementById('share-code2').textContent = bucket;
  document.getElementById('qr1').src = `https://api.qrserver.com/v1/create-qr-code/?size=120x120&color=000000&bgcolor=ffffff&data=${encodeURIComponent(url1)}`;
  document.getElementById('qr2').src = `https://api.qrserver.com/v1/create-qr-code/?size=120x120&color=000000&bgcolor=ffffff&data=${encodeURIComponent(url2)}`;
  document.getElementById('share-overlay').classList.remove('hidden');
}
function closeShare() { document.getElementById('share-overlay').classList.add('hidden'); }

// ─── UTILS ────────────────────────────────────
function show(id) {
  ['setup','ctrl','display'].forEach(s => {
    document.getElementById(s).classList.toggle('hidden', s !== id);
  });
}

  // ─── AUDIO UNLOCK (WICHTIG FÜR iPAD) ─────────
let audioUnlocked = false;

document.addEventListener('click', () => {
  if (audioUnlocked) return;

  const clickSound = document.getElementById('snd-click');
  const bingSound = document.getElementById('snd-bing');

  if (clickSound) clickSound.play().then(() => clickSound.pause()).catch(()=>{});
  if (bingSound) bingSound.play().then(() => bingSound.pause()).catch(()=>{});

  audioUnlocked = true;
});

// ─── AUTO-START (Für QR-Codes) ────────────────
(function() {
  const p = new URLSearchParams(location.search);
  const room = p.get('room');
  const mode = parseInt(p.get('mode'));
  if (room && (mode === 1 || mode === 2)) {
    bucket = room;
    dispMode = mode;
    startDisplay();
  }
})();
</script>
